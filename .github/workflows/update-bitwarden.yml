name: Update Bitwarden AppImage

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1"

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v15

      - name: Run updater
        run: ./scripts/update-version.sh

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Update Bitwarden AppImage"
          branch: "automation/update-bitwarden-appimage"
          title: "Update Bitwarden AppImage"
          body: |
            Automated update of Bitwarden Desktop AppImage version and hash.
          delete-branch: true
